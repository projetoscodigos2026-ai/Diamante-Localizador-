<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SatéliteDiamante</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#070a12;
    --bg-panel:rgba(13,20,36,0.72);
    --bg-panel-solid:#0d1424;
    --line:rgba(185,230,255,0.14);
    --ice:#b9e6ff;
    --ice-bright:#eaf6ff;
    --violet:#8b6bff;
    --magenta:#ff3d81;
    --dim:#7f8ba3;
    --success:#38f2b0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg-deep);overflow:hidden;}
  body{font-family:'Rajdhani',sans-serif;color:var(--ice-bright);}

  #map{position:absolute;inset:0;z-index:1;filter:saturate(1.05) contrast(1.03);}
  .leaflet-control-attribution{background:rgba(7,10,18,0.75)!important;color:var(--dim)!important;font-size:9px!important;}
  .leaflet-control-attribution a{color:var(--ice)!important;}
  .leaflet-control-zoom{display:none;}

  /* ===== faceted glass panel (signature element) ===== */
  .facet-panel{
    position:absolute; z-index:500;
    background:var(--bg-panel);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border:1px solid var(--line);
    clip-path:polygon(0 12px,12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%);
    box-shadow:0 0 0 1px rgba(185,230,255,0.03), 0 10px 40px rgba(0,0,0,0.55);
  }
  .facet-panel::before{
    content:'';position:absolute;top:0;left:0;width:12px;height:12px;
    background:linear-gradient(135deg,var(--ice) 0%,transparent 70%);opacity:0.35;
  }

  /* ===== brand mark ===== */
  #brand{top:16px;left:70px;padding:14px 20px 14px 16px;display:flex;align-items:center;gap:12px;}
  .gem{width:26px;height:26px;position:relative;flex-shrink:0;}
  .gem svg{width:100%;height:100%;filter:drop-shadow(0 0 6px rgba(185,230,255,0.55));}
  #brand h1{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;
    background:linear-gradient(90deg,var(--ice-bright),var(--ice) 55%,var(--violet));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  #brand span{display:block;font-size:9px;letter-spacing:3px;color:var(--dim);margin-top:2px;font-family:'IBM Plex Mono',monospace;}

  /* ===== search / control panel ===== */
  #searchPanel{top:16px;right:16px;width:min(320px,42vw);padding:14px;}
  #searchPanel label{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:8px;}
  .search-row{display:flex;gap:6px;}
  #addrInput{
    flex:1;background:rgba(3,6,12,0.6);border:1px solid var(--line);color:var(--ice-bright);
    padding:9px 10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;
    border-radius:3px;outline:none;
  }
  #addrInput::placeholder{color:var(--dim);}
  #addrInput:focus{border-color:var(--ice);box-shadow:0 0 0 1px rgba(185,230,255,0.3);}
  .btn{
    background:linear-gradient(135deg,var(--ice) 0%,var(--violet) 130%);
    border:none;color:#050810;font-weight:700;font-size:13px;letter-spacing:1px;
    padding:9px 14px;border-radius:3px;cursor:pointer;font-family:'Rajdhani',sans-serif;
    transition:transform .12s, box-shadow .12s;white-space:nowrap;
  }
  .btn:active{transform:scale(0.96);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ice);}
  #searchStatus{font-size:11px;color:var(--dim);margin-top:8px;min-height:14px;font-family:'IBM Plex Mono',monospace;}

  .layer-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
  .layer-opt{
    display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:3px;
    border:1px solid transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--dim);
    transition:.15s;
  }
  .layer-opt:hover{border-color:var(--line);color:var(--ice-bright);}
  .layer-opt.active{background:rgba(185,230,255,0.08);border-color:var(--ice);color:var(--ice-bright);}
  .layer-opt .dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;}
  .layer-opt.active .dot{background:var(--success);box-shadow:0 0 6px var(--success);}

  /* ===== coordinates / geo panel ===== */
  #geoPanel{bottom:16px;left:16px;width:min(300px,60vw);padding:14px;font-family:'IBM Plex Mono',monospace;}
  #geoPanel h3{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;font-weight:700;}
  .geo-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px dashed rgba(185,230,255,0.08);}
  .geo-row span:first-child{color:var(--dim);}
  .geo-row span:last-child{color:var(--ice-bright);}
  #geoAddr{margin-top:10px;font-size:11px;color:var(--ice);line-height:1.4;font-family:'Rajdhani',sans-serif;font-weight:600;}

  /* ===== telemetry panel (real ISS data) ===== */
  #telemPanel{bottom:16px;right:16px;width:min(260px,50vw);padding:14px;}
  #telemPanel h3{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--magenta);box-shadow:0 0 8px var(--magenta);animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .telem-row{display:flex;justify-content:space-between;font-size:11px;font-family:'IBM Plex Mono',monospace;padding:2px 0;}
  .telem-row span:first-child{color:var(--dim);}
  .telem-row span:last-child{color:var(--ice-bright);}
  #issNote{font-size:10px;color:var(--dim);margin-top:8px;line-height:1.4;}

  /* scanline sweep on load */
  #sweep{position:absolute;inset:0;z-index:400;pointer-events:none;
    background:linear-gradient(180deg,transparent 0%,rgba(185,230,255,0.10) 48%,transparent 100%);
    height:200%;top:-100%;animation:sweepDown 1.6s ease-out forwards;}
  @keyframes sweepDown{from{top:-100%;}to{top:100%;}}

  /* custom marker */
  .diamond-marker{width:20px;height:20px;position:relative;}
  .diamond-marker svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(255,61,129,0.8));}

  /* ===== botão mestre de esconder UI ===== */
  #uiToggle{
    position:absolute; top:16px; left:16px; z-index:600;
    width:44px;height:44px;border-radius:50%;
    background:var(--bg-panel); backdrop-filter:blur(14px);
    border:1px solid var(--line); color:var(--ice-bright);
    display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,0.5);
  }
  body.ui-hidden .facet-panel{display:none;}
  body.ui-hidden #brand{display:none;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none;}
  .panel-toggle{
    width:22px;height:22px;flex-shrink:0;border:1px solid var(--line);border-radius:3px;
    display:flex;align-items:center;justify-content:center;color:var(--ice);font-size:13px;
    background:rgba(185,230,255,0.06);
  }
  .facet-panel.collapsed .panel-body{display:none;}
  .facet-panel.collapsed{padding-bottom:10px !important; width:auto !important; max-width:none;}
  .facet-panel.collapsed .panel-head{white-space:nowrap;}
  #brand{max-width:56vw;}
  #brand h1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  @media (max-width:640px){
    #searchPanel{width:min(260px,72vw); top:74px; right:16px;}
    #brand{max-width:60vw;}
    #geoPanel{width:min(220px,56vw); bottom:74px;}
    #telemPanel{width:min(190px,42vw);}
    #brand h1{font-size:12px;}
    #brand{padding:10px 14px 10px 12px;}
    .facet-panel{padding:11px;}
  }
</style>
</head>
<body>

<div id="map"></div>
<div id="sweep"></div>
<div id="uiToggle" onclick="toggleUI()">☰</div>

<div id="brand" class="facet-panel">
  <div class="gem">
    <svg viewBox="0 0 100 100"><polygon points="50,4 90,32 74,96 26,96 10,32" fill="none" stroke="#b9e6ff" stroke-width="4"/><polygon points="50,4 90,32 50,46 10,32" fill="#b9e6ff" opacity="0.25"/><line x1="10" y1="32" x2="90" y2="32" stroke="#b9e6ff" stroke-width="2" opacity="0.6"/><line x1="50" y1="4" x2="50" y2="46" stroke="#eaf6ff" stroke-width="2" opacity="0.5"/></svg>
  </div>
  <div>
    <h1>SATÉLITEDIAMANTE</h1>
    <span>IMAGEM ORBITAL // TEMPO REAL</span>
  </div>
</div>

<div id="searchPanel" class="facet-panel">
  <div class="panel-head" onclick="togglePanel('searchPanel')">
    <label style="margin:0;">Localizar endereço</label>
    <div class="panel-toggle" id="searchPanelToggle">▁</div>
  </div>
  <div class="panel-body">
    <div class="search-row" style="margin-top:10px;">
      <input id="addrInput" type="text" placeholder="Ex: Av. Paulista, São Paulo" autocomplete="off" onclick="event.stopPropagation()">
      <button class="btn" onclick="event.stopPropagation();buscarEndereco()">IR</button>
    </div>
    <div id="searchStatus"></div>
    <button class="btn ghost" style="width:100%;margin-top:8px;" onclick="event.stopPropagation();usarMinhaLocalizacao()">📍 Minha localização real (GPS)</button>
    <div class="layer-list" id="layerList" onclick="event.stopPropagation()"></div>
  </div>
</div>

<div id="geoPanel" class="facet-panel collapsed">
  <div class="panel-head" onclick="togglePanel('geoPanel')">
    <h3 style="margin:0;">Coordenadas do cursor</h3>
    <div class="panel-toggle" id="geoPanelToggle">▔</div>
  </div>
  <div class="panel-body" style="margin-top:10px;">
    <div class="geo-row"><span>LAT</span><span id="lat">—</span></div>
    <div class="geo-row"><span>LON</span><span id="lon">—</span></div>
    <div class="geo-row"><span>ZOOM</span><span id="zoomLvl">—</span></div>
    <div id="geoAddr">Clique no mapa para identificar o local.</div>
  </div>
</div>

<div id="telemPanel" class="facet-panel collapsed">
  <div class="panel-head" onclick="togglePanel('telemPanel')">
    <h3 style="margin:0;"><span class="live-dot"></span> ISS</h3>
    <div class="panel-toggle" id="telemPanelToggle">▔</div>
  </div>
  <div class="panel-body" style="margin-top:8px;">
    <div class="telem-row"><span>LAT</span><span id="issLat">carregando…</span></div>
    <div class="telem-row"><span>LON</span><span id="issLon">—</span></div>
    <div class="telem-row"><span>ALT</span><span id="issAlt">—</span></div>
    <div class="telem-row"><span>VEL</span><span id="issVel">—</span></div>
    <div id="issNote">Dados reais via WhereTheISS.at (NORAD 25544). Atualiza a cada 8s.</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============ BOTÃO MESTRE: ESCONDER TODOS OS PAINÉIS ============
function toggleUI(){
  document.body.classList.toggle('ui-hidden');
  document.getElementById('uiToggle').textContent = document.body.classList.contains('ui-hidden') ? '⊞' : '☰';
}

// ============ PAINÉIS COLAPSÁVEIS ============
function togglePanel(id){
  const painel = document.getElementById(id);
  const toggle = document.getElementById(id+'Toggle');
  painel.classList.toggle('collapsed');
  toggle.textContent = painel.classList.contains('collapsed') ? '▔' : '▁';
}
function fecharPainel(id){
  const painel = document.getElementById(id);
  const toggle = document.getElementById(id+'Toggle');
  if(!painel.classList.contains('collapsed')){
    painel.classList.add('collapsed');
    toggle.textContent = '▔';
  }
}

// ============ MAPA ============
const map = L.map('map', { zoomControl:false, attributionControl:true }).setView([-15.78,-47.93], 4);

function gibsDate(){
  const d = new Date(); d.setDate(d.getDate()-2); // GIBS costuma ter 1-2 dias de defasagem
  return d.toISOString().split('T')[0];
}

const camadas = {
  "Mapa técnico (escuro)": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CARTO', maxZoom:19, subdomains:'abcd'
  }),
  "Satélite Esri (alta resolução)": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri, Maxar, Earthstar Geographics', maxZoom:19
  }),
  "Satélite NASA GIBS (global, quase tempo real)": L.tileLayer(
    `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_CorrectedReflectance_TrueColor/default/${gibsDate()}/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg`,
    { attribution: '© NASA GIBS / MODIS Terra', maxZoom:9 }
  ),
  "Mapa de ruas (claro)": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom:19
  })
};

let camadaAtual = camadas["Satélite Esri (alta resolução)"];
camadaAtual.addTo(map);

function montarLista(){
  const box = document.getElementById('layerList');
  Object.keys(camadas).forEach(nome=>{
    const el = document.createElement('div');
    el.className = 'layer-opt' + (camadas[nome]===camadaAtual ? ' active' : '');
    el.innerHTML = `<span class="dot"></span>${nome}`;
    el.onclick = () => {
      map.removeLayer(camadaAtual);
      camadaAtual = camadas[nome];
      camadaAtual.addTo(map);
      document.querySelectorAll('.layer-opt').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
    };
    box.appendChild(el);
  });
}
montarLista();

const diamondIcon = L.divIcon({
  className:'diamond-marker',
  html:'<svg viewBox="0 0 100 100"><polygon points="50,4 90,32 74,96 26,96 10,32" fill="#ff3d81" opacity="0.85" stroke="#eaf6ff" stroke-width="4"/></svg>',
  iconSize:[26,26], iconAnchor:[13,13]
});
let marcador = null;

// ============ COORDENADAS AO CLICAR ============
map.on('click', async (e) => {
  document.getElementById('lat').textContent = e.latlng.lat.toFixed(5)+'°';
  document.getElementById('lon').textContent = e.latlng.lng.toFixed(5)+'°';
  if (marcador) map.removeLayer(marcador);
  marcador = L.marker(e.latlng, {icon:diamondIcon}).addTo(map);
  document.getElementById('geoAddr').textContent = 'Identificando local...';
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&zoom=16`);
    const d = await r.json();
    document.getElementById('geoAddr').textContent = d.display_name || 'Endereço não identificado nesta área.';
  } catch(err) {
    document.getElementById('geoAddr').textContent = 'Falha ao consultar endereço (sem internet?).';
  }
});
map.on('zoomend', () => document.getElementById('zoomLvl').textContent = map.getZoom());
document.getElementById('zoomLvl').textContent = map.getZoom();

// ============ BUSCA DE ENDEREÇO (Nominatim — real, gratuito) ============
async function buscarEndereco(){
  const qOriginal = document.getElementById('addrInput').value.trim();
  const status = document.getElementById('searchStatus');
  if(!qOriginal){ status.textContent = 'Digite um endereço.'; return; }

  // Gera variações progressivamente mais simples (remove a primeira parte, geralmente rua/bairro)
  const partes = qOriginal.split(',').map(p=>p.trim()).filter(Boolean);
  const tentativas = [];
  for(let i=0;i<partes.length;i++){
    tentativas.push(partes.slice(i).join(', '));
  }
  if(tentativas.length===0) tentativas.push(qOriginal);

  status.textContent = 'Consultando OpenStreetMap...';

  for(let i=0;i<tentativas.length;i++){
    try{
      const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(tentativas[i])}&countrycodes=br&limit=1`);
      const d = await r.json();
      if(d.length){
        const lat = parseFloat(d[0].lat), lon = parseFloat(d[0].lon);
        const zoomAlvo = i===0 ? 17 : Math.max(17 - i*3, 6); // se caiu pra nível mais genérico, dá menos zoom
        map.flyTo([lat,lon], zoomAlvo, {duration:1.4});
        if (marcador) map.removeLayer(marcador);
        marcador = L.marker([lat,lon], {icon:diamondIcon}).addTo(map);
        document.getElementById('lat').textContent = lat.toFixed(5)+'°';
        document.getElementById('lon').textContent = lon.toFixed(5)+'°';
        document.getElementById('geoAddr').textContent = d[0].display_name;
        if(i===0){
          status.textContent = '✅ Endereço exato encontrado.';
        } else {
          status.textContent = `⚠️ Rua/bairro não mapeado no OpenStreetMap. Mostrando o nível mais próximo disponível: "${tentativas[i]}".`;
        }
        setTimeout(()=>fecharPainel('searchPanel'), 1400);
        return;
      }
    }catch(err){
      status.textContent = '❌ Erro de conexão.';
      return;
    }
  }
  status.textContent = '❌ Nenhum resultado encontrado, nem por cidade/estado.';
}
document.getElementById('addrInput').addEventListener('keydown', e=>{ if(e.key==='Enter') buscarEndereco(); });

// ============ GPS REAL DO USUÁRIO ============
function usarMinhaLocalizacao(){
  const status = document.getElementById('searchStatus');
  if(!navigator.geolocation){ status.textContent = 'GPS não suportado neste navegador.'; return; }
  status.textContent = 'Obtendo GPS...';
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude, longitude} = pos.coords;
    map.flyTo([latitude,longitude], 17, {duration:1.4});
    if (marcador) map.removeLayer(marcador);
    marcador = L.marker([latitude,longitude], {icon:diamondIcon}).addTo(map);
    document.getElementById('lat').textContent = latitude.toFixed(5)+'°';
    document.getElementById('lon').textContent = longitude.toFixed(5)+'°';
    status.textContent = '✅ GPS obtido.';
    setTimeout(()=>fecharPainel('searchPanel'), 900);
  }, err=>{ status.textContent = '❌ '+err.message; }, {enableHighAccuracy:true, timeout:10000});
}

// ============ TELEMETRIA REAL DA ISS ============
async function atualizarISS(){
  try{
    const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
    const d = await r.json();
    document.getElementById('issLat').textContent = d.latitude.toFixed(3)+'°';
    document.getElementById('issLon').textContent = d.longitude.toFixed(3)+'°';
    document.getElementById('issAlt').textContent = d.altitude.toFixed(1)+' km';
    document.getElementById('issVel').textContent = d.velocity.toFixed(0)+' km/h';
  }catch(err){
    document.getElementById('issLat').textContent = 'offline';
  }
}
atualizarISS();
setInterval(atualizarISS, 8000);

setTimeout(()=>{ document.getElementById('sweep').remove(); }, 1700);
</script>
</body>
</html>
